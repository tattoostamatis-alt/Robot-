# Named navigation goals for the LLM bridge's "goto" tool.
# Each entry is a 2D pose (frame_id: map) — x/y in meters, yaw in radians.
#
# Placeholder coordinates (all 0,0,0) — SLAM mapping is not yet functional
# (see project memory: roomba odometry/get_sensors() blocker). Once a real
# map exists, update these to actual coordinates, e.g. by driving the robot
# to each room and reading /amcl_pose, or by using RViz's "Publish Point"
# tool and reading /clicked_point.
living_room:
  x: 0.0
  y: 0.0
  yaw: 0.0
bedroom:
  x: 0.0
  y: 0.0
  yaw: 0.0
kitchen:
  x: 0.0
  y: 0.0
  yaw: 0.0
