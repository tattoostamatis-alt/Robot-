# Placeholder keepout mask — entirely free (no keepout zones) until edited.
# Plan (per project notes): after a full manual house-tour mapping session,
# use RViz's "Publish Point" tool over the known problem spots (couch,
# table) to get exact map-frame coordinates, then paint the corresponding
# pixels here as occupied (0) using any image editor (GIMP, etc.) at the
# same resolution/origin as the real saved map.
image: keepout_mask.pgm
mode: scale
resolution: 0.05
origin: [-5.0, -5.0, 0.0]
negate: 0
occupied_thresh: 0.65
free_thresh: 0.25
