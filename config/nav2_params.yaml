amcl:
  ros__parameters:
    use_sim_time: false
    # alpha1/alpha2 = rotational odom noise (from rotation / from translation).
    # Lowered 0.2 -> 0.1 because heading comes from the EKF's absolute BNO085
    # yaw, not raw wheel odom — trusting it tightens the angular particle
    # spread so the pose stops wobbling/jumping on turns. alpha3/alpha4
    # (translation noise) stay 0.2: x/y is pure vx integration with no direct
    # measurement, so it genuinely drifts and AMCL must keep correcting it.
    alpha1: 0.1
    alpha2: 0.1
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: base_link
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: map
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.5
    laser_max_range: 8.0
    laser_min_range: 0.1
    laser_model_type: likelihood_field
    max_beams: 180
    max_particles: 8000
    min_particles: 2000
    odom_frame_id: odom
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.1
    recovery_alpha_slow: 0.001
    resample_interval: 1
    robot_model_type: nav2_amcl::DifferentialMotionModel
    save_pose_rate: 0.5
    sigma_hit: 0.1
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.1
    update_min_d: 0.1
    z_hit: 0.8
    z_max: 0.05
    z_rand: 0.2
    z_short: 0.05
    scan_topic: scan

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    navigators: ['navigate_to_pose', 'navigate_through_poses']
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.10
      yaw_goal_tolerance: 0.25
    # MPPI (Model Predictive Path Integral) — switched from
    # RegulatedPurePursuitController 2026-06-30. RPP only *follows* the global
    # path and stops at obstacles (relying on global replan); MPPI samples
    # ~2000 candidate trajectories every cycle and picks the lowest-cost one
    # that BOTH follows the path AND steers clear of obstacles in the local
    # costmap — i.e. real reactive obstacle avoidance. Limits match the robot:
    # vx_max 0.20, reverse to -0.10, wz_max 0.6, DiffDrive. The
    # velocity_smoother below still applies the final gentle accel ramp.
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.05            # = 1/controller_frequency (20Hz)
      batch_size: 2000
      vx_std: 0.2
      vy_std: 0.0               # DiffDrive: no lateral motion
      wz_std: 0.4
      vx_max: 0.20
      vx_min: -0.10             # allow reversing during avoidance
      vy_max: 0.0
      wz_max: 0.6
      ax_max: 0.5
      ax_min: -0.5
      az_max: 1.0
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.015
      motion_model: "DiffDrive"
      visualize: true           # publishes candidate/optimal trajectories for RViz
      reset_period: 1.0
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      AckermannConstraints:
        min_turning_r: 0.0
      critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic",
                "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5
      # Obstacle avoidance. consider_footprint:true checks the real robot
      # rectangle (not just a circle) against the costmap — needed for
      # threading doorways with this 0.6x0.5m footprint.
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 1.0
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0

# Was running with no explicit config (all nav2 defaults: max_accel 2.5 m/s²
# linear / 3.2 rad/s² angular) — that's a near-instant jump to full speed,
# felt like "too much gas" at the start of every move. These limits ramp
# cmd_vel_nav -> cmd_vel_smoothed gently regardless of what FollowPath or
# behavior_server (spin/backup) request.
velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.20, 0.0, 0.6]
    min_velocity: [-0.10, 0.0, -0.6]
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
    max_accel: [0.05, 0.0, 0.5]
    max_decel: [-0.1, 0.0, -0.8]
    odom_topic: "odom"
    odom_duration: 0.1

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      footprint: "[[0.27, 0.25], [0.27, -0.25], [-0.33, -0.25], [-0.33, 0.25]]"
      # keepout_filter is harmless when use_keepout:=false (the default) —
      # filter_mask_server/costmap_filter_info_server just aren't running,
      # so this layer waits quietly for filter info and never applies
      # anything. Placeholder mask (config/keepout_mask.yaml/.pgm) is
      # entirely free until edited — see its header comment for the plan
      # (RViz Publish Point on couch/table spots once a real map exists).
      plugins: ["voxel_layer", "keepout_filter", "inflation_layer"]
      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: True
        filter_info_topic: "/costmap_filter_info"
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.30
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: true
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan depth_camera predicted_obstacles semantic_obstacles
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
        depth_camera:
          topic: /camera/camera/depth/color/points
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          clearing: true
          marking: true
          data_type: "PointCloud2"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
        predicted_obstacles:
          topic: /predicted_obstacles
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          clearing: false
          marking: true
          data_type: "PointCloud2"
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0
          obstacle_max_range: 5.0
          obstacle_min_range: 0.0
        semantic_obstacles:
          topic: /semantic_obstacles
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          clearing: false
          marking: true
          data_type: "PointCloud2"
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0
          obstacle_max_range: 5.0
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 5.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false
      footprint: "[[0.27, 0.25], [0.27, -0.25], [-0.33, -0.25], [-0.33, 0.25]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "keepout_filter", "inflation_layer"]
      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: True
        filter_info_topic: "/costmap_filter_info"
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.30
      always_send_full_costmap: true

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.20
      use_astar: true
      allow_unknown: true

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"
    spin_dist: 1.57
    linear_vel: -0.3
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2
    use_sim_time: false

collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    # Was "cmd_vel" — but that's also the raw command topic teleop/llm_bridge
    # publish to, so a relay from cmd_vel into cmd_vel_smoothed (joystick
    # path, 2026-06-22) plus this node echoing back out to "cmd_vel" would
    # loop forever. roomba_driver already listens on cmd_vel_safe, so this
    # is the single point where ANY command source (joystick, Nav2's own
    # autonomous chain, llm_bridge) gets the obstacle-distance check applied
    # before reaching the motors.
    cmd_vel_out_topic: "cmd_vel_safe"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    polygons: ["Stop", "FootprintApproach"]
    # Last-resort hard stop, independent of the velocity-based prediction
    # below. If anything the lidar sees ever ends up inside the *relevant*
    # sub-polygon for the commanded direction, cmd_vel is zeroed immediately
    # — catches cases FootprintApproach's time-to-collision estimate could
    # miss (sensor noise/latency, something appearing right next to the
    # robot, a bad recovery behavior, etc).
    #
    # type: velocity_polygon (not a single static "polygon") — a plain
    # static box stops ALL motion the instant anything enters it on ANY
    # side, even motion that's moving AWAY from the violating side (e.g.
    # something 400mm behind blocked driving forward too, confirmed live
    # 2026-06-22). velocity_polygon instead picks one of several
    # sub-polygons to check based on the commanded linear.x, so reversing
    # only checks the rear sub-polygon and driving forward only checks the
    # front one.
    #
    # User-specified clearances measured from the lidar itself,
    # not a uniform box — front 100mm, rear 400mm, left/right 200mm each.
    # Converted to base_link frame: lidar at x=+0.12, y=0.0 relative to base_link:
    #   front edge = 0.12 + 0.100 =  0.22
    #   rear  edge = 0.12 - 0.400 = -0.28
    #   left  edge = 0.00 + 0.200 =  0.20
    #   right edge = 0.00 - 0.200 = -0.20
    Stop:
      type: "velocity_polygon"
      action_type: "stop"
      holonomic: false
      velocity_polygons: ["moving_forward", "moving_backward", "stopped_or_rotating"]
      moving_forward:
        points: "[[0.22, 0.20], [0.22, -0.20], [-0.05, -0.20], [-0.05, 0.20]]"
        linear_min: 0.02
        linear_max: 1.0
        theta_min: -10.0
        theta_max: 10.0
      moving_backward:
        points: "[[0.05, 0.20], [0.05, -0.20], [-0.28, -0.20], [-0.28, 0.20]]"
        linear_min: -1.0
        linear_max: -0.02
        theta_min: -10.0
        theta_max: 10.0
      stopped_or_rotating:
        points: "[[0.22, 0.20], [0.22, -0.20], [-0.28, -0.20], [-0.28, 0.20]]"
        linear_min: -0.02
        linear_max: 0.02
        theta_min: -10.0
        theta_max: 10.0
      min_points: 3
      visualize: false
      enabled: true
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 1.2
      simulation_time_step: 0.1
      min_points: 6
      visualize: false
      enabled: true
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"
      min_height: 0.15
      max_height: 2.0
      enabled: true

docking_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 50.0
    initial_perception_timeout: 5.0
    wait_charge_timeout: 5.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: "base_link"
    fixed_frame: "odom"
    dock_backwards: false
    dock_prestaging_tolerance: 0.5
    dock_plugins: ["simple_charging_dock"]
    simple_charging_dock:
      plugin: "opennav_docking::SimpleChargingDock"
      docking_threshold: 0.05
      staging_x_offset: -0.7
      use_external_detection_pose: true

slam_toolbox:
  ros__parameters:
    use_sim_time: false
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    # HuberLoss down-weights outlier scan-matches (noisy/spurious lidar
    # returns, e.g. from carpet transitions or off-axis reflections)
    # instead of letting them pull the optimizer/map off — addresses
    # "noisy/smeared map" symptoms.
    ceres_loss_function: HuberLoss
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    # "Lifelong mapping": stays in `mapping` mode (keeps updating the map
    # as furniture/objects move — important for a tidying robot) but can
    # resume localizing in + extending a previously saved map via
    # map_file_name below, instead of starting from an empty map every
    # bringup.
    mode: mapping
    use_map_saver: true
    # After a good mapping session, save the pose-graph with:
    #   ~/robot_ws/src/home_robot/scripts/save_map.sh home
    # then uncomment map_file_name (and map_start_pose, if not starting
    # at the dock) to resume + keep extending that map on next bringup.
    # map_file_name: /home/dimi/robot_ws/src/home_robot/maps/home
    map_start_pose: [0.0, 0.0, 0.0]  # rough; correct via RViz "2D Pose Estimate" after launch
    # Lifelong-mapping tuning (only matters once map_file_name is set —
    # controls how scan matches against the OLD loaded map vs NEW scans
    # are weighted when deciding to keep/replace map data). Defaults from
    # slam_toolbox's mapper_params_lifelong.yaml.
    lifelong_search_use_tree: false
    lifelong_minimum_score: 0.1
    lifelong_iou_match: 0.85
    lifelong_node_removal_score: 0.04
    lifelong_overlap_score_scale: 0.06
    lifelong_constraint_multiplier: 0.08
    lifelong_nearby_penalty: 0.001
    lifelong_candidates_scale: 0.03
    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02
    map_update_interval: 5.0
    resolution: 0.05
    max_laser_range: 8.0
    minimum_time_interval: 0.5
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    enable_interactive_mode: true
    use_scan_matching: true
    use_scan_barycenter: true
    # Lowered again from 0.2/0.2 — was tuned for the old MPU9250
    # (gyro-only, no magnetometer, drifted between scan-matcher updates).
    # Now using a BNO085 (absolute heading via magnetometer, see ekf.yaml
    # header) so this is more conservative than strictly necessary, but
    # left as-is since frequent matching is still harmless. Original
    # rationale: large gaps let yaw drift build up unnoticed until a
    # loop-closure/match correction snaps it back all at once, showing up
    # as walls abruptly "doubling".
    minimum_travel_distance: 0.15
    minimum_travel_heading: 0.1
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5
    # Raised from 3.0 — with no magnetometer the IMU's yaw can drift enough
    # over a full-room traverse that a true loop-closure candidate (same
    # physical spot, revisited later) ends up slightly farther apart in the
    # current pose-graph estimate than the old 3.0m search radius allowed,
    # so the correction that would fix the drift never gets considered.
    loop_search_maximum_distance: 6.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true

# ── Keepout zones (use_keepout:=true, default false) ──────────────────
# filter_mask_server's yaml_filename is overridden at launch time
# (bringup.launch.py) to point at config/keepout_mask.yaml's real
# installed path, same pattern as slam_toolbox's map_file_name override.
filter_mask_server:
  ros__parameters:
    use_sim_time: false
    frame_id: map

costmap_filter_info_server:
  ros__parameters:
    use_sim_time: false
    filter_info_topic: /costmap_filter_info
    # Must be absolute — KeepoutFilter resolves this name inside its own
    # costmap's namespace (local_costmap/global_costmap), so a relative
    # name here resolved to e.g. /local_costmap/keepout_filter_mask
    # instead of the actual /keepout_filter_mask filter_mask_server
    # publishes on, and the mask was silently never received.
    mask_topic: /keepout_filter_mask
    type: 0
    base: 0.0
    multiplier: 1.0
